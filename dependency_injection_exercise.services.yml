services:
  dependency_injection_exercise.photo_list:
    class: Drupal\dependency_injection_exercise\Service\PhotoListService
    arguments: ['@http_client']

  dependency_injection_exercise.photos_breadcrumb_builder:
    class: Drupal\dependency_injection_exercise\Breadcrumb\PhotosBreadcrumbBuilder
    tags:
      - { name: breadcrumb_builder, priority: 100 }

  dependency_injection_exercise.language_manager_decorator:
    class: Drupal\dependency_injection_exercise\Service\LanguageManagerDecorator
    decorates: language_manager
    decoration_priority: 0
    arguments: ['@dependency_injection_exercise.language_manager_decorator.inner']

